name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate foundation
        run: npm test

      - name: Run mock smoke
        run: npm run slide:smoke

      - name: Check template drift
        run: npm run installer:check-templates

      - name: Check package boundary
        run: npm run installer:check-package

      - name: Validate global install
        run: npm run installer:validate
