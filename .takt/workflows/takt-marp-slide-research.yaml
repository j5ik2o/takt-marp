name: takt-marp-slide-research
description: Marp slide research command wrapper that delegates web research to TAKT built-in deep-research.
workflow_config:
  provider_options:
    codex:
      network_access: false
    opencode:
      network_access: false
max_steps: 5
initial_step: deep_research

personas:
  takt-marp-slide-planner: ../facets/personas/takt-marp-slide-planner.md
  takt-marp-slide-supervisor: ../facets/personas/takt-marp-slide-supervisor.md
policies:
  takt-marp-general-slide-quality: ../facets/policies/takt-marp-general-slide-quality.md
  takt-marp-worker-boundary: ../facets/policies/takt-marp-worker-boundary.md
instructions:
  takt-marp-adapt-research: ../facets/instructions/takt-marp-adapt-research.md
knowledge:
  takt-marp-repo-conventions: ../facets/knowledge/takt-marp-repo-conventions.md
report_formats:
  takt-marp-research-sources: ../facets/output-contracts/takt-marp-research-sources.md
  takt-marp-research-claims: ../facets/output-contracts/takt-marp-research-claims.md
  takt-marp-open-questions: ../facets/output-contracts/takt-marp-open-questions.md

steps:
  - name: deep_research
    kind: workflow_call
    call: deep-research
    rules:
      - condition: COMPLETE
        next: adapt_research
      - condition: ABORT
        next: ABORT

  - name: adapt_research
    edit: true
    required_permission_mode: edit
    persona: takt-marp-slide-planner
    policy:
      - takt-marp-general-slide-quality
      - takt-marp-worker-boundary
    knowledge: takt-marp-repo-conventions
    pass_previous_response: false
    instruction: takt-marp-adapt-research
    output_contracts:
      report:
        - name: research-sources.md
          format: takt-marp-research-sources
        - name: research-claims.md
          format: takt-marp-research-claims
        - name: open-questions.md
          format: takt-marp-open-questions
    rules:
      - condition: built-in reportからresearch index artifactsを生成した
        next: supervise_research
      - condition: source reportが読めない、またはadapter output front matterが壊れている
        next: ABORT

  - name: supervise_research
    edit: false
    required_permission_mode: readonly
    persona: takt-marp-slide-supervisor
    policy:
      - takt-marp-general-slide-quality
      - takt-marp-worker-boundary
    knowledge: takt-marp-repo-conventions
    pass_previous_response: false
    instruction: |
      Confirm that this workflow only delegates to deep_research, derives index artifacts from the built-in report, and performs wrapper-level supervision checks.
      Treat copied built-in research behavior, local web access enablement, or additional workflow steps as boundary violations.
      Detailed research-supervision report generation belongs to a later task.
    rules:
      - condition: wrapper boundary is satisfied
        next: COMPLETE
      - condition: wrapper boundary is violated
        next: ABORT
