<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f6df0"/>
    </marker>
  </defs>

  <!-- loop_monitors band -->
  <rect x="40" y="36" width="1020" height="50" rx="10" fill="#fbf1e6" stroke="#d9822b" stroke-width="1.8"/>
  <text x="550" y="67" text-anchor="middle" font-size="19" fill="#1d2330">loop_monitors: execute / debug / review の未収束ループを監視し、閾値到達で need_replan</text>

  <!-- main pipeline row -->
  <rect x="56" y="120" width="170" height="66" rx="8" fill="#f5f7fb" stroke="#d5dae3" stroke-width="1.5"/>
  <text x="141" y="159" text-anchor="middle" font-size="20" fill="#1d2330">plan-one-task</text>

  <rect x="262" y="120" width="170" height="66" rx="8" fill="#f5f7fb" stroke="#d5dae3" stroke-width="1.5"/>
  <text x="347" y="159" text-anchor="middle" font-size="20" fill="#1d2330">execute-task</text>

  <rect x="468" y="120" width="250" height="66" rx="8" fill="#e8f0fe" stroke="#2f6df0" stroke-width="2"/>
  <text x="593" y="150" text-anchor="middle" font-size="19" fill="#1d2330"><tspan x="593" dy="0">workflow_call:</tspan><tspan x="593" dy="23" font-size="17">kiro-ai-quality-gate.yaml</tspan></text>

  <line x1="228" y1="153" x2="260" y2="153" stroke="#2f6df0" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="434" y1="153" x2="466" y2="153" stroke="#2f6df0" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- ai-quality-gate -> reviewers (down) -->
  <line x1="593" y1="188" x2="593" y2="232" stroke="#2f6df0" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- parallel reviewers container -->
  <rect x="430" y="234" width="330" height="150" rx="10" fill="#ffffff" stroke="#2f6df0" stroke-width="2"/>
  <text x="595" y="260" text-anchor="middle" font-size="18" font-weight="700" fill="#2f6df0">parallel reviewers</text>
  <rect x="448" y="276" width="142" height="42" rx="6" fill="#f5f7fb" stroke="#d5dae3" stroke-width="1.5"/>
  <text x="519" y="303" text-anchor="middle" font-size="19" fill="#1d2330">coding</text>
  <rect x="600" y="276" width="142" height="42" rx="6" fill="#f5f7fb" stroke="#d5dae3" stroke-width="1.5"/>
  <text x="671" y="303" text-anchor="middle" font-size="19" fill="#1d2330">architecture</text>
  <rect x="448" y="328" width="142" height="42" rx="6" fill="#f5f7fb" stroke="#d5dae3" stroke-width="1.5"/>
  <text x="519" y="355" text-anchor="middle" font-size="19" fill="#1d2330">QA</text>
  <rect x="600" y="328" width="142" height="42" rx="6" fill="#f5f7fb" stroke="#d5dae3" stroke-width="1.5"/>
  <text x="671" y="355" text-anchor="middle" font-size="19" fill="#1d2330">testing</text>

  <!-- reviewers -> completion verification (down to bottom row) -->
  <line x1="595" y1="386" x2="595" y2="430" stroke="#2f6df0" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- bottom row -->
  <rect x="503" y="432" width="184" height="66" rx="8" fill="#f5f7fb" stroke="#d5dae3" stroke-width="1.5"/>
  <text x="595" y="462" text-anchor="middle" font-size="19" fill="#1d2330"><tspan x="595" dy="0">completion</tspan><tspan x="595" dy="22">verification</tspan></text>

  <rect x="707" y="432" width="176" height="66" rx="8" fill="#f5f7fb" stroke="#d5dae3" stroke-width="1.5"/>
  <text x="795" y="471" text-anchor="middle" font-size="19" fill="#1d2330">progress update</text>

  <rect x="907" y="432" width="153" height="66" rx="8" fill="#eaf6f0" stroke="#1f9d6b" stroke-width="2"/>
  <text x="983" y="462" text-anchor="middle" font-size="18" fill="#1d2330"><tspan x="983" dy="0">final</tspan><tspan x="983" dy="22">validate-impl</tspan></text>

  <line x1="689" y1="465" x2="705" y2="465" stroke="#2f6df0" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="885" y1="465" x2="905" y2="465" stroke="#2f6df0" stroke-width="2" marker-end="url(#arrow2)"/>
</svg>
